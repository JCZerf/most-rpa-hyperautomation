name: Build and Deploy to Cloud Run
on:
  push:
    branches: [main]        # automático na main
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch a deployar'
        default: main
        required: true
env:
  PROJECT_ID: most-rpa-hyperautomation-dev
  REGION: us-east1
  SERVICE: most-rpa-hyperautomation
  REPOSITORY: most-rpa-hyperautomation
  WORKLOAD_IDENTITY_PROVIDER: projects/641979797746/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  DEPLOY_SA: cloud-run-deployer@most-rpa-hyperautomation-dev.iam.gserviceaccount.com

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || 'main' }}

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.DEPLOY_SA }}
          project_id: ${{ env.PROJECT_ID }}

      - uses: docker/login-action@v3
        with:
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.auth_token }}
          registry: ${{ env.REGION }}-docker.pkg.dev

      - name: Build and Push Container
        run: |
          DOCKER_TAG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE }}:${{ github.sha }}"
          docker build -t "$DOCKER_TAG" .
          docker push "$DOCKER_TAG"

      - uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE }}:${{ github.sha }}

      - run: echo ${{ steps.deploy.outputs.url }}
