services:
  bot-stress:
    build:
      context: .
      dockerfile: Dockerfile
    image: most-rpa:stress
    container_name: most-rpa-bot-stress
    env_file:
      - .env
    environment:
      PORT: 8000
      GUNICORN_WORKERS: 1
      GUNICORN_THREADS: 2
      BOT_MAX_WORKERS: 1
    ports:
      - "8000:8000"
    cpus: 2.0
    mem_limit: 1g
    memswap_limit: 1g
    restart: "no"
